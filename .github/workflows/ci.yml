name: CI/CD

on:
  push:
    branches: [uat, main]
  pull_request:
    branches: [develop, uat, main]

# Cancel in-progress runs for the same branch or PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

# --------------------------------------------------------------------------
# STAGE 1 - TEST
# Runs on every PR and every push to uat/main
# Free tier: ~0-3 min per run on ubuntu-latest
# --------------------------------------------------------------------------
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.test.yml \
            run --rm test

# --------------------------------------------------------------------------
# STAGE 2 - BUILD AND PUSH
# Runs only on push to uat/main (not on PRs - saves CI minutes)
# Registry: ghcr.io - free, no DockerHub rate limits for your own images
# Multi-arch: builds amd64 + arm64 so the image runs on a Raspberry Pi (arm64)
# --------------------------------------------------------------------------
  build:
    name: Build and Push Image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # amd64 for cloud VMs, arm64 for the Raspberry Pi 5 deploy target
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}
          # Reuse layer cache from previous build on the same branch
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}
          cache-to: type=inline

# --------------------------------------------------------------------------
# STAGE 3a - DEPLOY TO UAT (automatic)
# Reaches the Raspberry Pi through a Cloudflare Tunnel - no open router ports.
# The runner authenticates to the tunnel with a Cloudflare Access service token
# and SSHes in via a cloudflared ProxyCommand.
# Secrets are scoped to the "uat" environment only.
# Set up at: Settings -> Environments -> uat -> Add secret
# --------------------------------------------------------------------------
  deploy-uat:
    name: Deploy to UAT
    needs: build
    if: github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL -o cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking accept-new
          EOF

      - name: Deploy to UAT
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          APP_VERSION: ${{ github.sha }}
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          APP_ENV_B64: ${{ secrets.APP_ENV_B64 }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          APP_PORT: ${{ secrets.APP_PORT }}
          HEALTH_PATH: ${{ secrets.HEALTH_PATH }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # The deploy job has no repo on the server, so ship the compose file over the tunnel
          ssh "${{ secrets.DEPLOY_HOST }}" "mkdir -p '$DEPLOY_PATH'"
          scp docker-compose.yml "${{ secrets.DEPLOY_HOST }}:$DEPLOY_PATH/docker-compose.yml"

          ssh "${{ secrets.DEPLOY_HOST }}" \
            APP_VERSION="$APP_VERSION" \
            APP_IMAGE="$APP_IMAGE" \
            APP_ENV_B64="$APP_ENV_B64" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            GHCR_USER="$GHCR_USER" \
            APP_PORT="$APP_PORT" \
            HEALTH_PATH="$HEALTH_PATH" \
            DEPLOY_PATH="$DEPLOY_PATH" \
            'bash -se' <<'SCRIPT'
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          # Authenticate to registry using the workflow token
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          # Write .env from base64 secret - decoded at deploy time, never stored in repo
          echo "$APP_ENV_B64" | base64 -d > .env
          printf "\nAPP_VERSION=%s\nAPP_IMAGE=%s\n" "$APP_VERSION" "$APP_IMAGE" >> .env

          # Pull new image and restart containers
          docker compose pull
          docker compose up -d --remove-orphans

          # Health check - polls up to 2 minutes
          for i in $(seq 1 8); do
            curl -sf "http://127.0.0.1:${APP_PORT}${HEALTH_PATH}" > /dev/null 2>&1 \
              && echo "Healthy after $((i * 15))s" && exit 0
            echo "Attempt $i/8 - waiting 15s..." && sleep 15
          done
          echo "Health check failed after 120s" && exit 1
          SCRIPT

# --------------------------------------------------------------------------
# STAGE 3b - DEPLOY TO PRODUCTION (manual gate)
# Blocked until a reviewer approves in GitHub UI
# Set up at: Settings -> Environments -> production -> Required reviewers
# Secrets are scoped to "production" only - UAT secrets are not accessible here
# --------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to PROD
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL -o cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH over Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking accept-new
          EOF

      - name: Deploy to PROD
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          APP_VERSION: ${{ github.sha }}
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          APP_ENV_B64: ${{ secrets.APP_ENV_B64 }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          APP_PORT: ${{ secrets.APP_PORT }}
          HEALTH_PATH: ${{ secrets.HEALTH_PATH }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # The deploy job has no repo on the server, so ship the compose file over the tunnel
          ssh "${{ secrets.DEPLOY_HOST }}" "mkdir -p '$DEPLOY_PATH'"
          scp docker-compose.yml "${{ secrets.DEPLOY_HOST }}:$DEPLOY_PATH/docker-compose.yml"

          ssh "${{ secrets.DEPLOY_HOST }}" \
            APP_VERSION="$APP_VERSION" \
            APP_IMAGE="$APP_IMAGE" \
            APP_ENV_B64="$APP_ENV_B64" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            GHCR_USER="$GHCR_USER" \
            APP_PORT="$APP_PORT" \
            HEALTH_PATH="$HEALTH_PATH" \
            DEPLOY_PATH="$DEPLOY_PATH" \
            'bash -se' <<'SCRIPT'
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          echo "$APP_ENV_B64" | base64 -d > .env
          printf "\nAPP_VERSION=%s\nAPP_IMAGE=%s\n" "$APP_VERSION" "$APP_IMAGE" >> .env

          docker compose pull
          docker compose up -d --remove-orphans

          for i in $(seq 1 8); do
            curl -sf "http://127.0.0.1:${APP_PORT}${HEALTH_PATH}" > /dev/null 2>&1 \
              && echo "Healthy after $((i * 15))s" && exit 0
            echo "Attempt $i/8 - waiting 15s..." && sleep 15
          done
          echo "Health check failed after 120s" && exit 1
          SCRIPT
